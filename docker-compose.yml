services:
  task-agent:
    image: bspark2318/task-agent:arm64
    build: .
    container_name: task-agent 
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes: 
      - ./data/${ENVIRONMENT}:/app/data/${ENVIRONMENT}
      - ./gmail_credentials.json:/app/gmail_credentials.json:ro
    env_file:
      - .env.${ENVIRONMENT:-dev}
    logging:
      driver: "json-file"
      options: 
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    # Same file as task-agent — cloudflared reads TUNNEL_TOKEN (Cloudflare’s name).
    env_file:
      - .env.${ENVIRONMENT:-dev}
    depends_on:
      - task-agent