services:
  task-agent:
    image: bspark2318/task-agent:arm64
    build: .
    container_name: task-agent-${ENVIRONMENT:-dev}
    restart: unless-stopped
    ports:
      - "${FASTAPI_PORT:-8000}:${FASTAPI_PORT:-8000}"
    volumes:
      - ./data/${ENVIRONMENT}:/app/data/${ENVIRONMENT}
      - ./credentials/gmail_credentials.json:/app/credentials/gmail_credentials.json:ro
    env_file:
      - .env.${ENVIRONMENT:-dev}
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  cloudflared:
    image: cloudflare/cloudflared:latest
    container_name: cloudflared-${ENVIRONMENT:-dev}
    restart: unless-stopped
    command: tunnel --no-autoupdate run
    env_file:
      - .env.${ENVIRONMENT:-dev}
    depends_on:
      - task-agent

  watchtower:
    image: containrrr/watchtower:latest
    container_name: watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup task-agent-${ENVIRONMENT:-dev}
    labels:
      - "com.centurylinklabs.watchtower.enable=false"
