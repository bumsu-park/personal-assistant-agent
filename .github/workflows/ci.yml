name: CI

on:
  push:
    branches: [main, "claude/**"]
  pull_request:

jobs:
  ci:
    uses: bumsu-park/ci/.github/workflows/python-ci.yml@main
    secrets: inherit
    with:
      python-version: "3.11"
      lint-paths: "src/ tests/"
      deploy: true
      docker-image: "bspark2318/task-agent:arm64"
      docker-platforms: "linux/arm64"
