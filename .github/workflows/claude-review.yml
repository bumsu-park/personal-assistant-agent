name: Claude Code Review

on:
  pull_request:
    types: [opened, synchronize, ready_for_review, reopened]
  issue_comment:
    types: [created]
  pull_request_review_comment:
    types: [created]

jobs:
  claude-review:
    if: >
      (github.event_name == 'pull_request') ||
      (github.event_name == 'issue_comment' && contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request_review_comment' && contains(github.event.comment.body, '@claude'))
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: write
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          track_progress: true
          prompt: |
            REPO: ${{ github.repository }}
            PR NUMBER: ${{ github.event.pull_request.number || github.event.issue.number }}

            Review this PR against the project conventions in CLAUDE.md:
            - Python 3.11, type hints everywhere
            - Async-first for I/O-bound functions
            - Plugin architecture (BasePlugin in src/core/plugin.py)
            - Config via environment variables (src/core/config.py), never hardcoded
            - Tests: pytest + pytest-asyncio, mock external services

            Focus on:
            - Bugs and logic errors
            - Missing error handling
            - Breaking changes to existing APIs
            - Unused imports or dead code
            - Security (hardcoded secrets, injection risks)
            - Test coverage for new logic

            Use inline comments for specific code issues.
            Post a summary comment with overall assessment.

          claude_args: |
            --allowedTools "mcp__github_inline_comment__create_inline_comment,Bash(gh pr comment:*),Bash(gh pr diff:*),Bash(gh pr view:*),Read"
